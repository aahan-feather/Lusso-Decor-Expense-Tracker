# Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: papa-expense-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: papa-db
          property: connectionString

databases:
  - name: papa-db
    databaseName: papa_expense
    user: papa_expense
    plan: free
