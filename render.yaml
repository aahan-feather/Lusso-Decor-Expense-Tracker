# Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: lusso-accounts-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lusso-db
          property: connectionString

databases:
  - name: lusso-db
    databaseName: lusso_accounts
    user: lusso_accounts
    plan: free
